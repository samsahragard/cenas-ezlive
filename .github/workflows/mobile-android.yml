name: Mobile Android Build

on:
  push:
    paths:
      - 'mobile/**'
      - '.github/workflows/mobile-android.yml'
  pull_request:
    paths:
      - 'mobile/**'
  workflow_dispatch:

permissions:
  contents: write  # required to create/update the android-debug-latest release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Capacitor deps
        working-directory: mobile
        run: npm install

      - name: Add Android platform
        working-directory: mobile
        run: npx cap add android

      - name: Sync Capacitor → Android
        working-directory: mobile
        run: npx cap sync android

      - name: Build debug APK
        working-directory: mobile/android
        run: chmod +x gradlew && ./gradlew assembleDebug

      - name: Rename APK for distribution
        run: cp mobile/android/app/build/outputs/apk/debug/app-debug.apk mobile/android/app/build/outputs/apk/debug/cenas-driver.apk

      - name: Upload debug APK (workflow artifact, requires GitHub login)
        uses: actions/upload-artifact@v4
        with:
          name: cenas-driver-debug-apk
          path: mobile/android/app/build/outputs/apk/debug/cenas-driver.apk
          if-no-files-found: error

      # Publish to a rolling release so /driver/app.apk on the live site
      # has a stable, no-login-required download URL for drivers to
      # sideload. Only runs on pushes to main so PR builds don't churn
      # the release.
      - name: Publish to android-debug-latest release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-debug-latest
          name: "Android debug build (latest)"
          body: |
            Rolling debug APK from the latest `main` build. Sideload only —
            not Play-Store signed yet. Drivers fetch this via
            https://app.cenaskitchen.com/driver/app.apk (302-redirects to
            the asset below).
          files: mobile/android/app/build/outputs/apk/debug/cenas-driver.apk
          prerelease: true
          make_latest: "false"
