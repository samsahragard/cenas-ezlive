name: Mobile Android Build

on:
  push:
    paths:
      - 'mobile/**'
      - '.github/workflows/mobile-android.yml'
  pull_request:
    paths:
      - 'mobile/**'
  workflow_dispatch:

permissions:
  contents: write  # required to create/update the android-debug-latest release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install Capacitor deps
        working-directory: mobile
        run: npm install

      - name: Add Android platform
        working-directory: mobile
        run: npx cap add android

      - name: Sync Capacitor → Android
        working-directory: mobile
        run: npx cap sync android

      - name: Build debug APK
        working-directory: mobile/android
        run: chmod +x gradlew && ./gradlew assembleDebug

      - name: Rename APK for distribution
        run: cp mobile/android/app/build/outputs/apk/debug/app-debug.apk mobile/android/app/build/outputs/apk/debug/cenas-driver.apk

      - name: Upload debug APK (workflow artifact, requires GitHub login)
        uses: actions/upload-artifact@v4
        with:
          name: cenas-driver-debug-apk
          path: mobile/android/app/build/outputs/apk/debug/cenas-driver.apk
          if-no-files-found: error

      # Publish to a rolling release so /driver/app.apk on the live site
      # has a stable, no-login-required download URL for drivers to
      # sideload. Only runs on pushes to main so PR builds don't churn
      # the release.
      - name: Publish to android-debug-latest release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-debug-latest
          name: "Android debug build (latest)"
          body: |
            Rolling debug APK from the latest `main` build. Sideload only —
            not Play-Store signed yet. Drivers fetch this via
            https://app.cenaskitchen.com/driver/app.apk (302-redirects to
            the asset below).
          files: mobile/android/app/build/outputs/apk/debug/cenas-driver.apk
          prerelease: true
          make_latest: "false"

  # Release AAB job — builds the SIGNED Android App Bundle for Play Store
  # upload (Internal Testing track and beyond). Runs only when the keystore
  # secrets are configured; otherwise skips with a notice. To enable:
  #   1. Generate an upload keystore (see mobile/README.md).
  #   2. Base64-encode it and add these GitHub Secrets on the repo:
  #        ANDROID_UPLOAD_KEYSTORE_B64
  #        ANDROID_KEYSTORE_PASSWORD
  #        ANDROID_KEY_ALIAS
  #        ANDROID_KEY_PASSWORD
  #   3. Push to mobile/** or run this workflow manually
  #      (workflow_dispatch).
  release-aab:
    runs-on: ubuntu-latest
    needs: build
    # Build the signed AAB on every push to main AND on manual dispatch
    # so Sam can re-trigger from the Actions UI without forcing a code push.
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Check whether release keystore is configured
        id: keystore_check
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_UPLOAD_KEYSTORE_B64 }}
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
            echo "Release keystore secret present — will build signed AAB."
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::ANDROID_UPLOAD_KEYSTORE_B64 not set on this repo — skipping signed AAB build. See mobile/README.md for setup."
          fi

      - name: Install Capacitor deps
        if: steps.keystore_check.outputs.configured == 'true'
        working-directory: mobile
        run: npm install

      - name: Add Android platform
        if: steps.keystore_check.outputs.configured == 'true'
        working-directory: mobile
        run: npx cap add android

      - name: Sync Capacitor → Android
        if: steps.keystore_check.outputs.configured == 'true'
        working-directory: mobile
        run: npx cap sync android

      - name: Decode keystore
        if: steps.keystore_check.outputs.configured == 'true'
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_UPLOAD_KEYSTORE_B64 }}
        run: |
          echo "$KEYSTORE_B64" | base64 --decode > /tmp/upload-keystore.jks
          ls -la /tmp/upload-keystore.jks

      - name: Inject release signing config + target SDK 35 + versionCode bump
        if: steps.keystore_check.outputs.configured == 'true'
        working-directory: mobile/android/app
        env:
          BUILD_VERSION_CODE: ${{ github.run_number }}
        run: |
          # Append signingConfigs.release + buildTypes.release.signingConfig,
          # PLUS override defaultConfig.targetSdkVersion to 35 (Play requires
          # 35+ for new internal-test releases as of late 2025) and bump
          # versionCode = GitHub Actions run_number so every CI build gets
          # a unique versionCode (Play rejects reuploads with same code).
          cat >> build.gradle <<GRADLE

          android {
              signingConfigs {
                  release {
                      storeFile file(System.getenv("KEYSTORE_PATH"))
                      storePassword System.getenv("KEYSTORE_PASSWORD")
                      keyAlias System.getenv("KEY_ALIAS")
                      keyPassword System.getenv("KEY_PASSWORD")
                  }
              }
              compileSdkVersion 35
              defaultConfig {
                  targetSdkVersion 35
                  versionCode ${BUILD_VERSION_CODE}
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                      minifyEnabled false
                      shrinkResources false
                  }
              }
          }
          GRADLE
          echo "--- tail of build.gradle ---"
          tail -36 build.gradle

      - name: Build signed release AAB
        if: steps.keystore_check.outputs.configured == 'true'
        working-directory: mobile/android
        env:
          KEYSTORE_PATH: /tmp/upload-keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew bundleRelease

      - name: Rename AAB for distribution
        if: steps.keystore_check.outputs.configured == 'true'
        run: cp mobile/android/app/build/outputs/bundle/release/app-release.aab mobile/android/app/build/outputs/bundle/release/cenas-kitchen-employee.aab

      - name: Upload signed AAB (workflow artifact, requires GitHub login)
        if: steps.keystore_check.outputs.configured == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: cenas-kitchen-employee-release-aab
          path: mobile/android/app/build/outputs/bundle/release/cenas-kitchen-employee.aab
          if-no-files-found: error
          retention-days: 60
