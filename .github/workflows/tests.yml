name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dev requirements
        run: |
          pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run pytest
        env:
          SECRET_KEY: ci-secret-for-tests
          ALLOW_DEV_SECRET: "1"
        run: pytest -q tests/
