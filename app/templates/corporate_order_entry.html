<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Corporate Order - Cenas Kitchen</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@600;700;800&family=Hanken+Grotesk:wght@400;500;600;700&family=Spline+Sans+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #171008;
      --bg2: #1d1409;
      --panel: #241a10;
      --raise: #332715;
      --line: #3c2d1b;
      --line2: #54401f;
      --text: #f4ead7;
      --dim: #bda380;
      --faint: #8d7556;
      --gold: #eba43b;
      --gold2: #ffc566;
      --red: #e2543f;
      --body: "Hanken Grotesk", sans-serif;
      --display: "Big Shoulders Display", sans-serif;
      --mono: "Spline Sans Mono", monospace;
    }
    * { box-sizing: border-box; }
    body {
      min-height: 100vh;
      margin: 0;
      color: var(--text);
      font-family: var(--body);
      background:
        radial-gradient(940px 480px at 85% -10%, rgba(235, 164, 59, 0.09), transparent 60%),
        radial-gradient(760px 520px at -10% 110%, rgba(226, 84, 63, 0.06), transparent 55%),
        linear-gradient(var(--bg), var(--bg2));
      background-attachment: fixed;
    }
    .login {
      width: min(820px, calc(100% - 28px));
      min-height: 100vh;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding: 28px 0;
      text-align: center;
    }
    .big {
      margin: 0;
      font-family: var(--display);
      font-size: clamp(44px, 10vw, 76px);
      font-weight: 800;
      line-height: 0.92;
      letter-spacing: 0;
      text-transform: uppercase;
    }
    .big em { color: var(--gold2); font-style: normal; }
    .sub {
      margin: 0;
      color: var(--faint);
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .profiles {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
      width: 100%;
      margin-top: 20px;
    }
    .profile-card {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(36, 26, 16, 0.88);
      padding: 18px 14px;
      text-align: left;
    }
    .profile-card.is-selected { border-color: var(--gold); box-shadow: 0 0 0 1px rgba(235, 164, 59, 0.22); }
    .profile-card h2 {
      margin: 0;
      font-family: var(--display);
      font-size: 25px;
      font-weight: 800;
      letter-spacing: 0;
      text-transform: uppercase;
    }
    .profile-card p {
      margin: 3px 0 14px;
      color: var(--faint);
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .pin-form { display: flex; gap: 8px; }
    .pin-form input {
      min-width: 0;
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--line2);
      border-radius: 8px;
      background: var(--bg2);
      color: var(--text);
      padding: 9px 10px;
      font-family: var(--mono);
      font-size: 17px;
      text-align: center;
      letter-spacing: 0.18em;
    }
    .pin-form button {
      min-height: 42px;
      border: 0;
      border-radius: 8px;
      background: var(--gold);
      color: #241a10;
      padding: 10px 14px;
      font-family: var(--display);
      font-size: 16px;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      cursor: pointer;
    }
    .error {
      width: 100%;
      border: 1px solid rgba(226, 84, 63, 0.55);
      border-radius: 8px;
      background: rgba(226, 84, 63, 0.10);
      color: #ff9a86;
      padding: 11px 14px;
      font-size: 13px;
    }
    @media (max-width: 760px) {
      .profiles { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="login">
    <h1 class="big">Corporate <em>Order</em></h1>
    <p class="sub">Choose a location and enter its 4 digit code</p>
    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}
    <section class="profiles" aria-label="Corporate order login choices">
      {% for scope, profile in profiles.items() %}
        <article class="profile-card {% if selected == scope %}is-selected{% endif %}">
          <h2>{{ profile.label }}</h2>
          <p>{{ profile.title }}</p>
          <form class="pin-form" method="POST" action="{{ url_for('corporate_order_public.portal_login') }}">
            <input type="hidden" name="scope" value="{{ scope }}">
            <input type="hidden" name="next" value="{{ next_url }}">
            <input type="hidden" name="store_context" value="{{ store_context or '' }}">
            <input
              type="password"
              name="pin"
              maxlength="4"
              minlength="4"
              inputmode="numeric"
              pattern="[0-9]{4}"
              autocomplete="off"
              placeholder="CODE"
              aria-label="{{ profile.label }} code"
              {% if selected == scope %}autofocus{% endif %}
              required>
            <button type="submit">Enter</button>
          </form>
        </article>
      {% endfor %}
    </section>
  </main>
</body>
</html>
