<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Driver Login — Cenas Kitchen</title>
  <link rel="manifest" href="{{ url_for('static', filename='manifest.webmanifest') }}">
  <meta name="theme-color" content="#0a0604">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Cenas Kitchen">
  <link rel="apple-touch-icon" sizes="180x180" href="{{ url_for('static', filename='icons/apple-touch-icon.png') }}">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: #0a0604;
      background-image:
        linear-gradient(rgba(10,6,4,0.65), rgba(10,6,4,0.85)),
        url('{{ url_for('static', filename='brand/bg-tequila.jpg') }}');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px 60px;
      box-sizing: border-box;
    }
    .brand {
      text-align: center;
      margin-bottom: 22px;
    }
    .brand img {
      height: 64px;
      width: auto;
      filter: drop-shadow(0 6px 16px rgba(0,0,0,0.6));
    }
    .brand h1 {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.55);
      margin: 6px 0 0 0;
    }
    .auth-card {
      width: 100%;
      max-width: 380px;
      background: rgba(0,0,0,0.55);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 18px;
      backdrop-filter: blur(12px);
      box-shadow: 0 6px 24px rgba(0,0,0,0.5);
      padding: 24px;
    }
    .auth-card h2 {
      margin: 0 0 4px 0;
      font-size: 20px;
      font-weight: 600;
    }
    .auth-card p.sub {
      margin: 0 0 18px 0;
      color: rgba(255,255,255,0.55);
      font-size: 13px;
    }
    .err {
      background: rgba(220, 80, 60, 0.18);
      border: 1px solid rgba(220, 80, 60, 0.45);
      color: #ffd9d2;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 14px;
    }
    label {
      display: block;
      font-size: 12px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.55);
      margin-bottom: 6px;
      margin-top: 12px;
    }
    input {
      width: 100%;
      padding: 11px 13px;
      font-size: 15px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      color: #fff;
      box-sizing: border-box;
    }
    input:focus {
      outline: none;
      border-color: rgba(232, 122, 62, 0.7);
      box-shadow: 0 0 0 3px rgba(232, 122, 62, 0.18);
    }
    button.submit {
      width: 100%;
      padding: 12px;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-top: 18px;
      background: rgba(232, 122, 62, 0.85);
      color: #fff;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }
    button.submit:hover { background: rgba(232, 122, 62, 1); }
    .alt {
      text-align: center;
      margin-top: 16px;
      font-size: 13px;
      color: rgba(255,255,255,0.55);
    }
    .alt a {
      color: var(--accent-soft, #f4b48a);
      text-decoration: none;
      font-weight: 600;
    }
    .alt a:hover { text-decoration: underline; }
    .back-home {
      margin-top: 22px;
      font-size: 12px;
      color: rgba(255,255,255,0.35);
      text-decoration: none;
    }
    .back-home:hover { color: rgba(255,255,255,0.6); }
  </style>
</head>
<body>
  <div class="brand">
    <img src="{{ url_for('static', filename='brand/logo-bull.png') }}" alt="Cenas Kitchen">
    <h1>Driver Portal</h1>
  </div>

  <div class="auth-card">
    <h2>Log in</h2>
    <p class="sub">Use the email + password you signed up with.</p>
    {% if error %}<div class="err">{{ error }}</div>{% endif %}
    <form method="POST" action="{{ url_for('driver.driver_login_submit') }}">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" autocomplete="email"
             required autofocus value="{{ prefill_email or '' }}">

      <label for="password">Password</label>
      <input type="password" id="password" name="password"
             autocomplete="current-password" required>

      <button class="submit" type="submit">Log in</button>
    </form>
    <p class="alt">No account yet? <a href="{{ url_for('driver.driver_signup') }}">Sign up</a></p>
  </div>

  <a class="back-home" href="/">← Back to store picker</a>
</body>
</html>
