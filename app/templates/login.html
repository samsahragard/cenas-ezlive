<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cenas Kitchen — Sign In</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      max-width: 380px;
      margin: 80px auto;
      padding: 30px;
      background: #f6f7f9;
      color: #222;
    }
    .card {
      background: #fff;
      padding: 28px 24px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }
    h1 {
      font-size: 22px;
      margin: 0 0 6px 0;
      font-weight: 600;
    }
    p.sub {
      color: #666;
      margin: 0 0 20px 0;
      font-size: 14px;
    }
    input[type=password] {
      width: 100%;
      padding: 12px 14px;
      font-size: 16px;
      border: 1px solid #d0d4d9;
      border-radius: 6px;
      box-sizing: border-box;
    }
    input[type=password]:focus {
      outline: none;
      border-color: #2266cc;
      box-shadow: 0 0 0 3px rgba(34,102,204,0.15);
    }
    button {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      margin-top: 14px;
      background: #2266cc;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 500;
    }
    button:hover { background: #1b54a8; }
    .err {
      color: #c0392b;
      background: #fdecea;
      padding: 10px 12px;
      border-radius: 6px;
      margin-bottom: 14px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Cenas Kitchen</h1>
    <p class="sub">Enter the staff password to continue.</p>
    {% if error %}<div class="err">{{ error }}</div>{% endif %}
    <form method="POST">
      <input type="password" name="password" autofocus required placeholder="Password" autocomplete="current-password">
      <button type="submit">Sign in</button>
    </form>
  </div>
</body>
</html>
