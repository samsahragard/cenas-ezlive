{# Role-matched badge image. The source art is cropped from the original
   role sign so only the role label remains; the "Dashboard" half is
   intentionally removed. dashboard_banner is injected app-wide by
   ezcater_routes.register_dashboard_banner ('general' = fallback). #}
<img class="dash-role-banner"
     src="{{ url_for('static', filename='brand/banners/role_only/' ~ (dashboard_banner|default('general')) ~ '.png') }}"
     alt="{{ (dashboard_banner|default('general'))|replace('_', ' ')|title }}">
