<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Partner Sign-In — Cenas Kitchen</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='dashboard.css') }}">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: #0a0604;
      background-image:
        linear-gradient(rgba(10,6,4,0.75), rgba(10,6,4,0.90)),
        url('{{ url_for('static', filename='brand/bg-tequila.jpg') }}');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      box-sizing: border-box;
    }
    .partner-card {
      background: rgba(0,0,0,0.65);
      border: 1px solid rgba(212, 175, 55, 0.40);
      border-radius: 16px;
      padding: 36px 36px 28px;
      max-width: 400px;
      width: 100%;
      box-shadow: 0 8px 28px rgba(0,0,0,0.55);
      backdrop-filter: blur(12px);
    }
    .partner-card h1 {
      margin: 0;
      font-family: 'Georgia', serif;
      font-size: 32px;
      font-weight: 800;
      letter-spacing: 4px;
      color: #d4af37;
      text-align: center;
    }
    .partner-card .sub {
      text-align: center;
      font-size: 12px;
      color: rgba(255,255,255,0.45);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin: 6px 0 24px;
    }
    .partner-card label {
      display: block;
      font-size: 11px;
      color: rgba(255,255,255,0.55);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }
    .partner-card input[type=password] {
      width: 100%;
      padding: 12px 14px;
      font-size: 16px;
      background: rgba(0,0,0,0.45);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 8px;
      color: #fff;
      box-sizing: border-box;
    }
    .partner-card input[type=password]:focus {
      outline: none;
      border-color: rgba(212, 175, 55, 0.7);
      box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.15);
    }
    .partner-card button {
      width: 100%;
      padding: 12px;
      font-size: 15px;
      margin-top: 16px;
      background: linear-gradient(180deg, #d4af37 0%, #b8932a 100%);
      color: #0a0604;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 700;
      letter-spacing: 0.5px;
    }
    .partner-card button:hover { filter: brightness(1.07); }
    .partner-card .err {
      color: #ff8888;
      background: rgba(255, 80, 80, 0.10);
      border: 1px solid rgba(255, 80, 80, 0.30);
      padding: 10px 12px;
      border-radius: 8px;
      margin-bottom: 14px;
      font-size: 13px;
    }
    .partner-card .back {
      text-align: center;
      margin-top: 18px;
      font-size: 12px;
    }
    .partner-card .back a {
      color: rgba(255,255,255,0.55);
      text-decoration: none;
    }
    .partner-card .back a:hover { color: #fff; }
  </style>
</head>
<body>
  <div class="partner-card">
    <h1>PARTNER</h1>
    <p class="sub">Owner sign-in</p>
    {% if error %}<div class="err">{{ error }}</div>{% endif %}
    <form method="POST">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" autofocus required autocomplete="current-password">
      <button type="submit">Continue</button>
    </form>
    <div class="back"><a href="/">← Back to store picker</a></div>
  </div>
</body>
</html>
